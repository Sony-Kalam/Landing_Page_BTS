<html>
    <head>
        <title>landing page</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
       <header>
        <div style="display:flex;align-items: center;">
            <img src="BTS.png" alt="BTS logo" height="50px" width="40px">
            <span style="font-size:xx-large;margin-left: 20px;font-weight: bold;">BTS Fan Page</span>
        </div>
        <nav style="margin-right: 80px;">
            <a href="#home">Home</a>
            <a href="#members">Members</a>
            <a href="#discover">Discover</a>
        </nav>
       </header>
       <div class="firstdiv">
            <div class="half">
                <p style="font-size: xx-large;">Welcome to the BTS Fan Page!</p>
                <br>
                <p>Everything you love about BTS in one place:💜</p>
                <br><br>
                <button>Learn More</button>
            </div>
            <div class="half">
                <img src="bts_members.png" alt="bts_photo" width="70%" height="70%">
            </div>
        </div>
       <div class="seconddiv">
            <h2 style="color:white;margin-left: 30px;">Meet The Members</h2>
            <div class="imgdiv">
                <figure class="fig">
                    <img src="jk.jpg" alt="jk" width="200px" height="200px">
                    <figcaption>Jeon Jung Kook</figcaption>
                </figure>
                <figure class="fig">
                    <img src="v.jpg" alt="v" width="200px" height="200px">
                    <figcaption>Kim Tae Hyung</figcaption>
                </figure>
                <figure class="fig">
                    <img src="jimin.jpg" alt="jimin" width="200px" height="200px">
                    <figcaption>Park Jimin</figcaption>
                </figure>
                <figure class="fig">
                    <img src="hobi.jpg" alt="hobi" width="200px" height="200px">
                    <figcaption>Jung Ho Seok</figcaption>
                </figure>
                <figure class="fig">
                    <img src="rm.jpg" alt="rm" width="200px" height="200px">
                    <figcaption>Kim Nam Joon</figcaption>
                </figure>
                <figure class="fig">
                    <img src="suga.jpg" alt="suga" width="200px" height="200px">
                    <figcaption>Min Yoongi</figcaption>
                </figure>
                <figure class="fig">
                    <img src="jin.jpg" alt="jin" width="200px" height="200px">
                    <figcaption>Kim Seok Jin</figcaption>
                </figure>
            </div>
       </div>
       <div class="thirddiv">
            <h2 style="margin-left: 30px;">Songs and Albums</h2>
            <div style="display:flex;">
            <a href="#songs">
                <figure>
                    <img src="songs.avif" alt="songs" width="150px" height="150px">
                    <figcaption style="font-style: italic;font-size: medium;">BTS Songs</figcaption>
                </figure>
            </a>
            <a href="#Albums">
                <figure>
                    <img src="albums.jpg" alt="albums" width="150px" height="150px">
                    <figcaption style="font-style: italic;font-size: medium;">BTS Albums</figcaption>
                </figure>
            </a>
            </div>
       </div>
       <footer>
            <h2>Stay Connected with BTS</h2>
            <div class="footer">
                <a href="https://ibighit.com/bts/" target="_blank"><img src="bighit.png" alt="bighit" width="50px" height="50px"></a>
                <a href="https://www.instagram.com/bts.bighitofficial/" target="_blank"><img src="insta.jpg" alt="insta" width="50px" height="50px"></a>
                <a href="https://twitter.com/BTS_twt" target="_blank"><img src="twt.png" alt="twitter" width="50px" height="50px"></a>
                <a href="https://www.facebook.com/bangtan.official" target="_blank"><img src="fb.png" alt="facebook" width="50px" height="50px"></a>
                <a href="https://www.youtube.com/user/BANGTANTV" target="_blank"><img src="ytb.png" alt="youtube" width="50px" height="50px"></a>
            </div>     
       </footer>
    </body>
</html>
